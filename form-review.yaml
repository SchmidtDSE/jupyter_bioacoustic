pass_value:
  source_column: id
  column: detection_id

is_valid_form:
  - is_valid_select: true
  - textbox:
      label: notes
      column: notes
  - annotation:
      start_time:
        label: signal start
        column: signal_start_time
        source_value: start_time
      tools: time_select

no_form:
  - select:
      label: verified name
      column: verified_common_name
      required: true
      items:
        path: categories.csv
        value: common_name
  - select:
      label: verif. confidence
      column: verification_confidence
      items:
        - low
        - medium
        - high

submission_buttons:
  line: true
  next:
    label: Skip
  submit:
    label: Verify
